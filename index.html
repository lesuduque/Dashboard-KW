<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mi Viaje · SEO Dashboard</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>✍️</text></svg>">
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f9f9f7;
        color: #1a1a18;
        padding: 2rem 1.5rem;
        font-size: 15px;
      }
      .dash {
        max-width: 900px;
        margin: 0 auto;
      }
      .header {
        margin-bottom: 1.25rem;
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 12px;
        flex-wrap: wrap;
      }
      .header-left h1 {
        font-size: 20px;
        font-weight: 500;
      }
      .header-left p {
        font-size: 13px;
        color: #6b6b67;
        margin-top: 3px;
      }
      .save-status {
        font-size: 11px;
        padding: 4px 10px;
        border-radius: 10px;
        border: 0.5px solid #d4d4cc;
        color: #6b6b67;
        white-space: nowrap;
        align-self: flex-start;
        margin-top: 4px;
      }
      .save-status.saved {
        color: #085041;
        background: #e1f5ee;
        border-color: #5dcaa5;
      }
      .save-status.saving {
        color: #633806;
        background: #faeeda;
        border-color: #ef9f27;
      }
      .tabs {
        display: flex;
        gap: 6px;
        margin-bottom: 1.5rem;
        flex-wrap: wrap;
      }
      .tab {
        padding: 6px 14px;
        border-radius: 20px;
        border: 0.5px solid #ccc;
        background: transparent;
        font-size: 13px;
        cursor: pointer;
        color: #6b6b67;
        font-family: inherit;
        transition: all 0.15s;
      }
      .tab.active {
        background: #1a1a18;
        color: #fff;
        border-color: #1a1a18;
      }
      .tab:hover:not(.active) {
        background: #f0f0ec;
      }
      .section {
        display: none;
      }
      .section.active {
        display: block;
      }
      .filters {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        margin-bottom: 1rem;
        align-items: center;
      }
      .filters select,
      .filters input {
        font-size: 13px;
        padding: 6px 10px;
        border-radius: 8px;
        border: 0.5px solid #ccc;
        background: #fff;
        color: #1a1a18;
        font-family: inherit;
      }
      .badge {
        display: inline-block;
        font-size: 11px;
        padding: 2px 8px;
        border-radius: 10px;
        font-weight: 500;
      }
      .badge.h1 {
        background: #e6f1fb;
        color: #0c447c;
      }
      .badge.h2 {
        background: #e1f5ee;
        color: #085041;
      }
      .badge.h3 {
        background: #faeeda;
        color: #633806;
      }
      .badge.cta {
        background: #eeedfe;
        color: #3c3489;
      }
      .kw-table {
        width: 100%;
        border-collapse: collapse;
        font-size: 13px;
        table-layout: fixed;
      }
      .kw-table th {
        text-align: left;
        padding: 8px 10px;
        border-bottom: 0.5px solid #e8e8e4;
        color: #6b6b67;
        font-weight: 500;
        font-size: 12px;
      }
      .kw-table td {
        padding: 8px 10px;
        border-bottom: 0.5px solid #e8e8e4;
        color: #1a1a18;
        vertical-align: top;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .kw-table tr:last-child td {
        border-bottom: none;
      }
      .kw-table tr:hover td {
        background: #f5f5f1;
      }
      .kw-table .col-del {
        width: 32px;
        text-align: center;
      }
      .card {
        background: #fff;
        border: 0.5px solid #e8e8e4;
        border-radius: 12px;
        overflow: hidden;
      }
      .table-wrap {
        overflow-x: auto;
      }
      .copy-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
        gap: 12px;
      }
      .copy-card {
        background: #fff;
        border: 0.5px solid #e8e8e4;
        border-radius: 12px;
        padding: 14px;
        position: relative;
      }
      .copy-card .copy-id {
        font-size: 11px;
        color: #9b9b96;
        font-family: monospace;
        margin-bottom: 6px;
      }
      .copy-card .copy-meta {
        display: flex;
        gap: 6px;
        align-items: center;
        flex-wrap: wrap;
        margin-bottom: 10px;
      }
      .copy-card .copy-text {
        font-size: 13px;
        line-height: 1.5;
        margin-bottom: 8px;
        background: #f5f5f1;
        padding: 8px 10px;
        border-radius: 8px;
      }
      .copy-card .copy-label {
        font-size: 11px;
        color: #9b9b96;
        margin-bottom: 4px;
      }
      .copy-card .copy-vos {
        font-size: 12px;
        color: #6b6b67;
        line-height: 1.4;
      }
      .copy-card .copy-notes {
        font-size: 11px;
        color: #6b6b67;
        margin-top: 8px;
        padding-top: 8px;
        border-top: 0.5px solid #e8e8e4;
      }
      .pill {
        display: inline-block;
        font-size: 11px;
        padding: 2px 8px;
        border-radius: 10px;
        border: 0.5px solid #e8e8e4;
        color: #6b6b67;
      }
      .add-section {
        background: #f5f5f1;
        border: 0.5px solid #e8e8e4;
        border-radius: 12px;
        padding: 1.25rem;
        margin-top: 1.5rem;
      }
      .add-section h3 {
        font-size: 15px;
        font-weight: 500;
        margin-bottom: 1rem;
      }
      .form-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }
      .form-field {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }
      .form-field label {
        font-size: 12px;
        color: #6b6b67;
      }
      .form-field input,
      .form-field select,
      .form-field textarea {
        font-size: 13px;
        padding: 7px 10px;
        border-radius: 8px;
        border: 0.5px solid #ccc;
        background: #fff;
        color: #1a1a18;
        font-family: inherit;
      }
      .form-field.full {
        grid-column: 1/-1;
      }
      .form-field textarea {
        resize: vertical;
        min-height: 66px;
      }
      .btn-add {
        margin-top: 12px;
        padding: 8px 18px;
        border-radius: 8px;
        border: 0.5px solid #ccc;
        background: #1a1a18;
        color: #fff;
        font-size: 13px;
        cursor: pointer;
        font-family: inherit;
      }
      .btn-add:hover {
        opacity: 0.85;
      }
      .btn-del {
        background: none;
        border: none;
        cursor: pointer;
        color: #9b9b96;
        font-size: 14px;
        padding: 2px 4px;
        border-radius: 4px;
        line-height: 1;
      }
      .btn-del:hover {
        color: #a32d2d;
        background: #fcebeb;
      }
      .stats-row {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
        gap: 10px;
        margin-bottom: 1.5rem;
      }
      .stat-card {
        background: #f5f5f1;
        border-radius: 8px;
        padding: 12px;
      }
      .stat-card .sv {
        font-size: 22px;
        font-weight: 500;
      }
      .stat-card .sk {
        font-size: 11px;
        color: #6b6b67;
        margin-top: 2px;
      }
      .empty {
        text-align: center;
        padding: 2rem;
        color: #6b6b67;
        font-size: 14px;
      }
      .count-badge {
        font-size: 11px;
        background: #f5f5f1;
        border-radius: 10px;
        padding: 1px 7px;
        color: #6b6b67;
        margin-left: 4px;
      }
      .tag {
        display: inline-block;
        font-size: 11px;
        padding: 2px 7px;
        border-radius: 10px;
        background: #eeedfe;
        color: #3c3489;
        margin-right: 4px;
      }
      .smi-card {
        background: #fff;
        border: 0.5px solid #e8e8e4;
        border-radius: 12px;
        padding: 14px;
        margin-bottom: 10px;
      }
      .del-card {
        position: absolute;
        top: 10px;
        right: 10px;
      }
    </style>
  </head>
  <body>
    <div class="dash">
      <div class="header">
        <div class="header-left">
          <h1>Mi Viaje · SEO Dashboard</h1>
          <p>Keywords, copys y estructura · BAC Credomatic</p>
        </div>
        <span class="save-status" id="save-status">Cargando...</span>
      </div>

      <div class="tabs">
        <button class="tab active" onclick="showTab('kw', this)">
          Keywords <span class="count-badge" id="kw-count">0</span>
        </button>
        <button class="tab" onclick="showTab('copys', this)">
          Banco de copys <span class="count-badge" id="copy-count">0</span>
        </button>
        <button class="tab" onclick="showTab('struct', this)">
          Estructura
        </button>
        <button class="tab" onclick="showTab('smi', this)">
          Sobre mi viaje
        </button>
      </div>

      <div id="sec-kw" class="section active">
        <div class="stats-row" id="kw-stats"></div>
        <div class="filters">
          <select id="kw-pais" onchange="renderKW()">
            <option value="">Todos los países</option>
            <option value="CR">Costa Rica</option>
            <option value="HN">Honduras</option>
            <option value="GT">Guatemala</option>
            <option value="NI">Nicaragua</option>
            <option value="SV">El Salvador</option>
            <option value="PA">Panamá</option>
          </select>
          <select id="kw-producto" onchange="renderKW()">
            <option value="">Todos los productos</option>
            <option>Vuelos</option>
            <option>Hoteles</option>
            <option>Autos</option>
            <option>Paquetes</option>
            <option>Seguro</option>
            <option>Financiamiento</option>
          </select>
          <select id="kw-jerarquia" onchange="renderKW()">
            <option value="">Todas las jerarquías</option>
            <option>H1</option>
            <option>H2</option>
            <option>H3</option>
          </select>
          <select id="kw-tipo" onchange="renderKW()">
            <option value="">Todos los tipos</option>
            <option value="info">Informacional</option>
            <option value="trans">Transaccional</option>
          </select>
          <input
            type="text"
            id="kw-search"
            placeholder="Buscar keyword..."
            oninput="renderKW()"
            style="flex: 1; min-width: 150px"
          />
        </div>
        <div class="card">
          <div class="table-wrap">
            <table class="kw-table">
              <thead>
                <tr>
                  <th style="width: 100px">País</th>
                  <th>Keyword</th>
                  <th style="width: 140px">Intención</th>
                  <th style="width: 100px">Tipo</th>
                  <th style="width: 90px">Producto</th>
                  <th style="width: 50px">Nivel</th>
                  <th class="col-del"></th>
                </tr>
              </thead>
              <tbody id="kw-tbody"></tbody>
            </table>
          </div>
        </div>
        <div class="add-section">
          <h3>Agregar keyword</h3>
          <div class="form-grid">
            <div class="form-field">
              <label>País</label
              ><select id="new-kw-pais">
                <option value="CR">Costa Rica</option>
                <option value="HN">Honduras</option>
                <option value="GT">Guatemala</option>
                <option value="NI">Nicaragua</option>
                <option value="SV">El Salvador</option>
                <option value="PA">Panamá</option>
              </select>
            </div>
            <div class="form-field">
              <label>Producto</label
              ><select id="new-kw-prod">
                <option>Vuelos</option>
                <option>Hoteles</option>
                <option>Autos</option>
                <option>Paquetes</option>
                <option>Seguro</option>
                <option>Financiamiento</option>
              </select>
            </div>
            <div class="form-field full">
              <label>Keyword</label
              ><input
                type="text"
                id="new-kw-text"
                placeholder="ej. reservar vuelos baratos desde Honduras"
              />
            </div>
            <div class="form-field">
              <label>Intención principal</label
              ><input
                type="text"
                id="new-kw-int"
                placeholder="ej. Reserva de vuelos"
              />
            </div>
            <div class="form-field">
              <label>Tipo</label
              ><select id="new-kw-tipo">
                <option value="info">Informacional</option>
                <option value="trans">Transaccional</option>
              </select>
            </div>
            <div class="form-field">
              <label>Jerarquía</label
              ><select id="new-kw-jer">
                <option>H1</option>
                <option>H2</option>
                <option>H3</option>
              </select>
            </div>
          </div>
          <button class="btn-add" onclick="addKW()">Agregar keyword</button>
        </div>
      </div>

      <div id="sec-copys" class="section">
        <div class="filters">
          <select id="cp-plantilla" onchange="renderCopys()">
            <option value="">Todas las plantillas</option>
            <option>Inicio</option>
            <option>Sobre Mi Viaje</option>
            <option>Promociones</option>
            <option>Tutoriales</option>
            <option>Experiencias Exclusivas</option>
          </select>
          <select id="cp-elemento" onchange="renderCopys()">
            <option value="">Todos los elementos</option>
            <option>H1</option>
            <option>H2</option>
            <option>H3</option>
            <option>CTA</option>
            <option>Texto apoyo</option>
            <option>Microcopy</option>
          </select>
          <input
            type="text"
            id="cp-search"
            placeholder="Buscar copy..."
            oninput="renderCopys()"
            style="flex: 1; min-width: 150px"
          />
        </div>
        <div id="copy-grid" class="copy-grid"></div>
        <div class="add-section">
          <h3>Agregar copy</h3>
          <div class="form-grid">
            <div class="form-field">
              <label>ID</label
              ><input type="text" id="new-cp-id" placeholder="ej. HOME-H1-04" />
            </div>
            <div class="form-field">
              <label>Plantilla</label
              ><select id="new-cp-plantilla">
                <option>Inicio</option>
                <option>Sobre Mi Viaje</option>
                <option>Promociones</option>
                <option>Tutoriales</option>
                <option>Experiencias Exclusivas</option>
              </select>
            </div>
            <div class="form-field">
              <label>Elemento</label
              ><select id="new-cp-elemento">
                <option>H1</option>
                <option>H2</option>
                <option>H3</option>
                <option>CTA</option>
                <option>Texto apoyo</option>
                <option>Microcopy</option>
              </select>
            </div>
            <div class="form-field">
              <label>Bloque</label
              ><input type="text" id="new-cp-bloque" placeholder="ej. Hero" />
            </div>
            <div class="form-field full">
              <label>Texto base (neutral)</label
              ><textarea
                id="new-cp-texto"
                placeholder="Texto principal del copy..."
              ></textarea>
            </div>
            <div class="form-field full">
              <label>Versión "tú"</label
              ><textarea
                id="new-cp-tu"
                placeholder="Versión tuteo..."
              ></textarea>
            </div>
            <div class="form-field full">
              <label>Versión "vos"</label
              ><textarea
                id="new-cp-vos"
                placeholder="Versión voseo..."
              ></textarea>
            </div>
            <div class="form-field full">
              <label>Notas de uso</label
              ><input
                type="text"
                id="new-cp-notas"
                placeholder="ej. CTA principal recomendado."
              />
            </div>
          </div>
          <button class="btn-add" onclick="addCopy()">Agregar copy</button>
        </div>
      </div>

      <div id="sec-struct" class="section"><div id="struct-cards"></div></div>

      <div id="sec-smi" class="section">
        <div class="filters">
          <select id="smi-variante" onchange="renderSMI()">
            <option value="">Ambas versiones</option>
            <option value="vos">Solo "vos"</option>
            <option value="tu">Solo "tú"</option>
          </select>
          <input
            type="text"
            id="smi-search"
            placeholder="Buscar..."
            oninput="renderSMI()"
            style="flex: 1; min-width: 150px"
          />
        </div>
        <div id="smi-list"></div>
      </div>
    </div>

      let kwData = [],
        copyData = [],
        saveTimer = null;

      function loadData() {
        setSaveStatus("Cargando...", "");
        try {
          const r = localStorage.getItem(STORAGE_KW);
          kwData = r ? JSON.parse(r) : [...DEFAULT_KW];
        } catch (e) {
          kwData = [...DEFAULT_KW];
        }
        try {
          const r = localStorage.getItem(STORAGE_CP);
          copyData = r ? JSON.parse(r) : [...DEFAULT_CP];
        } catch (e) {
          copyData = [...DEFAULT_CP];
        }
        setSaveStatus("Guardado", "saved");
        renderKW();
        renderCopys();
        renderStruct();;
        renderSMI();
      }

      function setSaveStatus(txt, cls) {
        const el = document.getElementById("save-status");
        el.textContent = txt;
        el.className = "save-status" + (cls ? " " + cls : "");
      }

      function saveData() {
        setSaveStatus("Guardando...", "saving");
        try {
          localStorage.setItem(STORAGE_KW, JSON.stringify(kwData));
          localStorage.setItem(STORAGE_CP, JSON.stringify(copyData));
          setSaveStatus("Guardado", "saved");
        } catch (e) {
          setSaveStatus("Error al guardar", "");
        }
      }

      function scheduleSave() {
        clearTimeout(saveTimer);
        saveTimer = setTimeout(saveData, 800);
      }

      function showTab(t, btn) {
        document
          .querySelectorAll(".tab")
          .forEach((e) => e.classList.remove("active"));
        document
          .querySelectorAll(".section")
          .forEach((e) => e.classList.remove("active"));
        btn.classList.add("active");
        document.getElementById("sec-" + t).classList.add("active");
      }

      function badgeH(j) {
        if (!j) return "";
        return `<span class="badge ${j.toLowerCase()}">${j}</span>`;
      }

      function renderKW() {
        const pais = document.getElementById("kw-pais").value;
        const prod = document.getElementById("kw-producto").value;
        const jer = document.getElementById("kw-jerarquia").value;
        const tipo = document.getElementById("kw-tipo").value;
        const q = document.getElementById("kw-search").value.toLowerCase();
        const data = kwData.filter((r) => {
          if (pais && r.pais !== pais) return false;
          if (prod && r.p !== prod) return false;
          if (jer && r.j !== jer) return false;
          if (tipo && r.t !== tipo) return false;
          if (
            q &&
            !r.k.toLowerCase().includes(q) &&
            !r.i.toLowerCase().includes(q)
          )
            return false;
          return true;
        });
        document.getElementById("kw-count").textContent = kwData.length;
        const stats = {};
        kwData.forEach((r) => {
          stats[r.pais] = (stats[r.pais] || 0) + 1;
        });
        document.getElementById("kw-stats").innerHTML = Object.entries(PAISES)
          .map(
            ([c, n]) =>
              `<div class="stat-card"><div class="sv">${stats[c] || 0}</div><div class="sk">${n}</div></div>`,
          )
          .join("");
        const tbody = document.getElementById("kw-tbody");
        if (!data.length) {
          tbody.innerHTML =
            '<tr><td colspan="7" class="empty">Sin resultados</td></tr>';
          return;
        }
        tbody.innerHTML = data
          .map((r) => {
            const idx = kwData.indexOf(r);
            return `<tr>
      <td><span class="pill">${PAISES[r.pais] || r.pais}</span></td>
      <td style="font-size:13px;">${r.k}</td>
      <td style="color:#6b6b67;font-size:12px;">${r.i}</td>
      <td><span class="pill">${r.t === "trans" ? "Transaccional" : "Informacional"}</span></td>
      <td><span class="tag">${r.p}</span></td>
      <td>${badgeH(r.j)}</td>
      <td class="col-del"><button class="btn-del" onclick="delKW(${idx})">×</button></td>
    </tr>`;
          })
          .join("");
      }

      function delKW(idx) {
        kwData.splice(idx, 1);
        scheduleSave();
        renderKW();
      }

      function addKW() {
        const pais = document.getElementById("new-kw-pais").value;
        const p = document.getElementById("new-kw-prod").value;
        const k = document.getElementById("new-kw-text").value.trim();
        const i = document.getElementById("new-kw-int").value.trim();
        const t = document.getElementById("new-kw-tipo").value;
        const j = document.getElementById("new-kw-jer").value;
        if (!k) return;
        kwData.push({ pais, p, k, i, t, j });
        document.getElementById("new-kw-text").value = "";
        document.getElementById("new-kw-int").value = "";
        scheduleSave();
        renderKW();
      }

      function renderCopys() {
        const pl = document.getElementById("cp-plantilla").value;
        const el = document.getElementById("cp-elemento").value;
        const q = document.getElementById("cp-search").value.toLowerCase();
        const data = copyData.filter((r) => {
          if (pl && r.pl !== pl) return false;
          if (el && r.el !== el) return false;
          if (
            q &&
            !r.tx.toLowerCase().includes(q) &&
            !r.id.toLowerCase().includes(q) &&
            !(r.tu || "").toLowerCase().includes(q)
          )
            return false;
          return true;
        });
        document.getElementById("copy-count").textContent = copyData.length;
        const grid = document.getElementById("copy-grid");
        if (!data.length) {
          grid.innerHTML = '<p class="empty">Sin resultados</p>';
          return;
        }
        grid.innerHTML = data
          .map((r) => {
            const idx = copyData.indexOf(r);
            const elCls = r.el.startsWith("H") ? r.el.toLowerCase() : "cta";
            return `<div class="copy-card">
      <button class="btn-del del-card" onclick="delCopy(${idx})">×</button>
      <div class="copy-id">${r.id}</div>
      <div class="copy-meta"><span class="pill">${r.pl}</span><span class="badge ${elCls}">${r.el}</span><span style="font-size:11px;color:#9b9b96;">${r.bl || ""}</span></div>
      <div class="copy-label">Texto base</div>
      <div class="copy-text">${r.tx}</div>
      ${r.vos && r.vos !== r.tu ? `<div class="copy-label">Versión "vos"</div><div class="copy-vos">${r.vos}</div>` : ""}
      ${r.nt ? `<div class="copy-notes">${r.nt}</div>` : ""}
    </div>`;
          })
          .join("");
      }

      function delCopy(idx) {
        copyData.splice(idx, 1);
        scheduleSave();
        renderCopys();
      }

      function addCopy() {
        const id = document.getElementById("new-cp-id").value.trim();
        const pl = document.getElementById("new-cp-plantilla").value;
        const el = document.getElementById("new-cp-elemento").value;
        const bl = document.getElementById("new-cp-bloque").value.trim();
        const tx = document.getElementById("new-cp-texto").value.trim();
        const tu = document.getElementById("new-cp-tu").value.trim();
        const vos = document.getElementById("new-cp-vos").value.trim();
        const nt = document.getElementById("new-cp-notas").value.trim();
        if (!tx) return;
        copyData.push({
          id: id || "COPY-" + Date.now(),
          pl,
          el,
          bl,
          tx,
          tu: tu || tx,
          vos: vos || tx,
          nt,
        });
        [
          "new-cp-id",
          "new-cp-bloque",
          "new-cp-texto",
          "new-cp-tu",
          "new-cp-vos",
          "new-cp-notas",
        ].forEach((f) => (document.getElementById(f).value = ""));
        scheduleSave();
        renderCopys();
      }

      function renderStruct() {
        document.getElementById("struct-cards").innerHTML = STRUCT_DATA.map(
          (s) => `
    <div class="smi-card" style="margin-bottom:12px;">
      <h4 style="font-size:15px;font-weight:500;margin-bottom:4px;">${s.name}</h4>
      <p style="font-size:12px;color:#6b6b67;margin-bottom:12px;">${s.obj}</p>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
        <div>
          <div style="font-size:11px;color:#9b9b96;margin-bottom:6px;">Opciones de H1</div>
          ${s.h1.map((h) => `<div style="font-size:12px;padding:5px 8px;background:#f5f5f1;border-radius:6px;margin-bottom:4px;">${h}</div>`).join("")}
          ${s.cta ? `<div style="margin-top:10px;"><div style="font-size:11px;color:#9b9b96;margin-bottom:4px;">CTA principal</div><span class="badge cta">${s.cta}</span></div>` : ""}
        </div>
        <div>
          <div style="font-size:11px;color:#9b9b96;margin-bottom:6px;">Bloques H2</div>
          ${s.h2.map((h) => `<div style="display:flex;align-items:center;gap:6px;margin-bottom:4px;"><span class="badge h2" style="font-size:10px;flex-shrink:0">H2</span><span style="font-size:12px;">${h}</span></div>`).join("")}
          ${s.h3.length ? `<div style="margin-top:8px;"><div style="font-size:11px;color:#9b9b96;margin-bottom:4px;">H3 opcionales</div>${s.h3.map((h) => `<span class="tag">${h}</span>`).join("")}</div>` : ""}
        </div>
      </div>
      <div style="margin-top:10px;font-size:12px;padding:8px 10px;background:#f5f5f1;border-radius:6px;color:#6b6b67;">${s.apoyo}</div>
    </div>`,
        ).join("");
      }

      function renderSMI() {
        const variante = document.getElementById("smi-variante").value;
        const q = document.getElementById("smi-search").value.toLowerCase();
        const data = SMI_DATA.filter(
          (r) => !q || (r.h1v + r.h1t + r.p1v + r.kw).toLowerCase().includes(q),
        );
        document.getElementById("smi-list").innerHTML = data
          .map((r) => {
            const sv = !variante || variante === "vos";
            const st = !variante || variante === "tu";
            return `<div class="smi-card">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px;">
        <span style="font-size:11px;font-family:monospace;background:#f5f5f1;padding:2px 8px;border-radius:6px;">Opción ${r.op}</span>
        ${r.kw
          .split(",")
          .map((k) => `<span class="tag">${k.trim()}</span>`)
          .join("")}
      </div>
      ${
        sv
          ? `<div style="margin-bottom:${st ? "12px" : "0"};">
        <div style="font-size:11px;color:#9b9b96;margin-bottom:4px;">Versión "vos"</div>
        <p style="font-size:14px;font-weight:500;margin-bottom:6px;">${r.h1v}</p>
        <p style="font-size:13px;line-height:1.5;margin-bottom:4px;">${r.p1v}</p>
        <p style="font-size:13px;line-height:1.5;color:#6b6b67;">${r.p2v}</p>
      </div>`
          : ""
      }
      ${sv && st ? `<hr style="border:none;border-top:0.5px solid #e8e8e4;margin:12px 0;">` : ""}
      ${
        st
          ? `<div>
        <div style="font-size:11px;color:#9b9b96;margin-bottom:4px;">Versión "tú"</div>
        <p style="font-size:14px;font-weight:500;margin-bottom:6px;">${r.h1t}</p>
        <p style="font-size:13px;line-height:1.5;margin-bottom:4px;">${r.p1t}</p>
        <p style="font-size:13px;line-height:1.5;color:#6b6b67;">${r.p2t}</p>
      </div>`
          : ""
      }
    </div>`;
          })
          .join("");
      }

      loadData();
    </script>
  </body>
</html>
